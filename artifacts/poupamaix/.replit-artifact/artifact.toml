kind = "web"
previewPath = "/"
title = "PoupaMais"
version = "1.0.0"
id = "artifacts/poupamaix"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19526

[services.development]
run = "pnpm --filter @workspace/poupamaix run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/poupamaix", "run", "build" ]
publicDir = "artifacts/poupamaix/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19526"
BASE_PATH = "/"
